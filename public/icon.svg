<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#2C2F34"/>
  <!-- pyramide: grijze vlakken -->
  <polygon points="256,112 256,330 130,330" fill="#9AA0A8"/>
  <polygon points="256,112 382,330 256,330" fill="#C5CAD1"/>
  <!-- rode accentvlakken naast de middenlijn -->
  <polygon points="256,112 256,330 214,330" fill="#CE2A2B"/>
  <polygon points="256,112 298,330 256,330" fill="#E0473F"/>
  <!-- facetlijnen -->
  <g stroke="#2C2F34" stroke-width="5">
    <line x1="256" y1="112" x2="256" y2="330"/>
    <line x1="256" y1="112" x2="214" y2="330"/>
    <line x1="256" y1="112" x2="298" y2="330"/>
    <line x1="193" y1="221" x2="319" y2="221"/>
  </g>
  <!-- spiegeling -->
  <g opacity="0.16">
    <polygon points="256,348 130,348 256,470" fill="#9AA0A8"/>
    <polygon points="256,348 382,348 256,470" fill="#C5CAD1"/>
  </g>
</svg>
